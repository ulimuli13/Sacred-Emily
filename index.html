<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sacret Emily</title>
</head>
<style>
    body {
        height: 300vh;
        aspect-ratio: 3510 / 2532;
        margin: 0;
        padding: 0;

    }

    .content {
        width: 100%;
        height: 100%;
    }

    .content img {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }

</style>


<body>
    <div class="content">
        <img src="Sacret Emily.svg" alt="">
    </div>

    <script>
  window.addEventListener("load", () => {
    const root = document.documentElement;

    const left = (root.scrollWidth - window.innerWidth) / 2;
    const top  = (root.scrollHeight - window.innerHeight) / 2;

    window.scrollTo({
      left: Math.max(0, left),
      top: Math.max(0, top),
      behavior: "auto"
    });
  });
</script>

</body>


</html>
  </html>
</html>
