<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sacret Emily</title>
</head>
<style>
    html, body {
        height: 350vh;
        aspect-ratio: 3510 / 2532;
        margin: 0;
        padding: 0;
        background-color: 130,151,78  ;
        overscroll-behavior: none;

    }

    @media (max-width: 768px) {
        html, body {
            height: 210vh;
            aspect-ratio: 3510 / 2532;
            overscroll-behavior: none;
        }
    }

    .content {
        width: 100%;
        height: 100%;
    }

    .content img {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }

   

</style>


<body>
    <div class="content">
        <img src="Sacret Emily.svg" alt="">
    </div>



    <script>
  window.addEventListener("load", () => {
    const root = document.documentElement;

    const left = (root.scrollWidth - window.innerWidth) / 2;
    const top  = (root.scrollHeight - window.innerHeight) / 2;

    window.scrollTo({
      left: Math.max(0, left),
      top: Math.max(0, top),
      behavior: "auto"
    });
  });

  document.addEventListener("gesturestart", function(e) {
  e.preventDefault();
});

</script>

</body>


</html>
  </html>
</html>
